<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenith v2 — Local AI Assistant</title>
<style>
:root {
  --bg-app: #282c34; --bg-sidebar: #21252b; --bg-panel: #2c313a;
  --bg-input: #1b1d23; --border: #343b48; --border-hover: #404758;
  --text: #dddddd; --text-muted: #717e95; --text-secondary: #abb2bf;
  --accent: #bd93f9; --accent2: #ff79c6; --danger: #ff5555;
  --success: #50fa7b; --chat-bg: rgba(50,50,50,0.78);
  --sidebar-w: 250px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',sans-serif;background:var(--bg-app);color:var(--text);font-size:13px;line-height:1.6;overflow:hidden}
#app{display:flex;height:100vh}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--bg-sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column}
.sidebar-h{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sidebar-logo{width:28px;height:28px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:5px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:16px}
.sidebar-h span{font-size:15px;font-weight:700;color:var(--accent)}
.sidebar-act{padding:10px 16px;border-bottom:1px solid var(--border)}
.sidebar-list{flex:1;overflow-y:auto;padding:4px 0}
.sb-item{display:flex;align-items:center;gap:6px;padding:7px 16px;cursor:pointer;color:var(--text-secondary);font-size:12px;transition:all .15s}
.sb-item:hover{background:var(--bg-panel);color:var(--text)}
.sb-item.active{background:var(--bg-panel);color:var(--accent);border-left:2px solid var(--accent)}
.sb-item .t{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-item .del{opacity:0;color:var(--text-muted);cursor:pointer;padding:2px;border-radius:3px}
.sb-item:hover .del{opacity:1}
.sb-item .del:hover{color:var(--danger);background:rgba(255,85,85,0.1)}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{height:44px;min-height:44px;background:var(--bg-panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:8px}
.topbar .title{flex:1;font-size:13px;font-weight:600}
.msg-area{flex:1;overflow-y:auto;padding:16px 24px;display:flex;flex-direction:column;gap:12px}
.msg{display:flex;gap:10px;max-width:85%;animation:in .3s}@keyframes in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.usr{align-self:flex-end;flex-direction:row-reverse}
.msg .av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.msg.usr .av{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.msg.ai .av{background:var(--bg-panel);border:1px solid var(--border);color:var(--accent)}
.msg .b{padding:10px 14px;border-radius:8px;font-size:13px;line-height:1.6;word-break:break-word;white-space:pre-wrap}
.msg.usr .b{background:linear-gradient(135deg,rgba(189,147,249,0.3),rgba(255,121,198,0.2));border:1px solid rgba(189,147,249,0.2);border-bottom-right-radius:3px}
.msg.ai .b{background:var(--chat-bg);border:1px solid var(--border);border-bottom-left-radius:3px}
.input-area{padding:10px 24px 14px;border-top:1px solid var(--border)}
.input-w{display:flex;gap:8px;align-items:flex-end;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;padding:6px;transition:border .15s}
.input-w:focus-within{border-color:var(--accent)}
.input-w textarea{flex:1;background:0;border:0;color:var(--text);font:inherit;font-size:13px;line-height:1.5;padding:6px;resize:none;outline:0;min-height:38px;max-height:180px}
.input-w textarea::placeholder{color:var(--text-muted)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:7px 14px;border-radius:5px;border:2px solid var(--border);background:var(--bg-panel);color:var(--text);font:inherit;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{background:#394150;border-color:var(--border-hover)}.btn:active{background:#232831}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-pri{background:var(--accent);border-color:var(--accent);color:#1b1d23}
.btn-pri:hover{background:#d0a8ff;border-color:#d0a8ff}
.btn-sm{padding:4px 10px;font-size:11px;border-radius:4px}
.btn-full{width:100%}
.btn-icon{width:34px;height:34px;padding:0;background:0;border:0;color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:5px}
.btn-icon:hover{background:var(--bg-panel);color:var(--text)}
.btn-icon.send{color:var(--accent)}
.btn-icon.send:hover{background:rgba(189,147,249,0.15)}
.proposals{padding:10px 24px;border-top:1px solid var(--border);background:var(--bg-panel)}
.proposals .hint{font-size:11px;color:var(--text-muted);margin-bottom:6px}
.prop-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;font-size:12px;margin-bottom:4px}
.prop-item .txt{flex:1;color:var(--text-secondary)}
.reminder{margin:4px 16px;padding:10px 14px;background:var(--bg-panel);border:1px solid var(--border);border-radius:6px;font-size:12px;line-height:1.6;white-space:pre-wrap}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-muted);text-align:center;padding:32px}
.empty h3{font-size:24px;color:var(--accent);margin-bottom:8px}
.typing{display:flex;gap:4px;padding:4px 0}.typing span{width:7px;height:7px;border-radius:50%;background:var(--text-muted);animation:b 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes b{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:0}::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}
.settings{max-width:660px;margin:0 auto;padding:32px}.settings h3{font-size:14px;margin-bottom:10px;color:var(--text);border-bottom:1px solid var(--border);padding-bottom:6px}
.fg{margin-bottom:14px}.fg label{display:block;font-size:11px;color:var(--text-muted);margin-bottom:4px}
.fg input,.fg textarea,.fg select{width:100%;padding:7px 10px;background:var(--bg-input);border:1px solid var(--border);border-radius:5px;color:var(--text);font:inherit;font-size:12px}
.fg input:focus,.fg textarea:focus,.fg select:focus{outline:0;border-color:var(--accent)}
.fg textarea{min-height:80px;resize:vertical;line-height:1.5}
.toast-ct{position:fixed;bottom:20px;right:20px;z-index:100}.toast{max-width:400px;padding:10px 14px;background:var(--bg-panel);border:1px solid var(--border);border-radius:10px;font-size:12px;margin-top:6px;animation:ti .3s}
@keyframes ti{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
.hidden{display:none!important}
</style>
</head>
<body>
<div id="app">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-h"><div class="sidebar-logo">Z</div><span>Zenith v2</span></div>
    <div class="sidebar-act"><button class="btn btn-pri btn-sm btn-full" onclick="newChat()">+ 新对话</button></div>
    <div class="sidebar-list" id="convList"></div>
  </div>
  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <span class="title" id="convTitle">Zenith v2</span>
      <button class="btn btn-sm" onclick="showSettings()">⚙</button>
    </div>
    <div id="chatView">
      <div class="msg-area" id="msgArea">
        <div class="empty"><h3>Zenith v2</h3><p>你的本地智能助手<br>聊天、日程、笔记、代码执行</p></div>
      </div>
      <div class="proposals hidden" id="proposalsBar"></div>
      <div class="input-area">
        <div class="input-w">
          <textarea id="chatInput" placeholder="输入消息，Enter 发送，Shift+Enter 换行..." rows="1" onkeydown="handleKey(event)"></textarea>
          <button class="btn-icon send" onclick="sendMessage()" id="sendBtn" title="发送">➤</button>
        </div>
      </div>
    </div>
    <div id="settingsView" class="hidden" style="flex:1;overflow-y:auto">
      <div class="settings">
        <h3>API 配置</h3>
        <div class="fg"><label>API Base URL</label><input id="s-api" placeholder="https://api.siliconflow.cn/v1"></div>
        <div class="fg"><label>API Key</label><input id="s-key" type="password" placeholder="sk-..."></div>
        <div class="fg"><label>模型</label><input id="s-model" placeholder="deepseek-ai/DeepSeek-V3"></div>
        <h3 style="margin-top:20px">参数</h3>
        <div class="fg"><label>Temperature</label><input id="s-temp" type="range" min="0" max="2" step="0.1"><span id="s-temp-v"></span></div>
        <div class="fg"><label>Max Tokens</label><input id="s-mt" type="number" min="100" max="32768"></div>
        <div style="margin-top:16px">
          <button class="btn btn-pri" onclick="saveSettings()">保存设置</button>
          <button class="btn" onclick="hideSettings()" style="margin-left:8px">返回对话</button>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="toast-ct" id="toastCt"></div>

<script>
// ─── State ───
let conversations = [], activeConv = null, messages = [], msgId = 0;
let isLoading = false, streamingText = '', proposals = [];

// ─── API ───
const API = '/api';
async function req(url, opts = {}) {
  if (!opts.headers) opts.headers = {};
  if (opts.body && typeof opts.body === 'object') {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(opts.body);
  }
  const r = await fetch(API + url, opts);
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.error||e.detail||'Error'); }
  return r.json();
}

// ─── Conversations ───
async function loadConvs() {
  try { conversations = await req('/conversations'); renderConvs(); }
  catch(e) { toast('加载失败: '+e.message); }
}
function renderConvs() {
  const el = document.getElementById('convList');
  if (!conversations.length) { el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:12px">暂无对话</div>'; return; }
  el.innerHTML = conversations.map(c => `
    <div class="sb-item${activeConv&&c.id===activeConv.id?' active':''}" onclick="selectConv('${c.id}')">
      <span class="t">${esc(c.title)}</span>
      <span style="font-size:10px;color:var(--text-muted)">${c.msg_count||0}</span>
      <span class="del" onclick="event.stopPropagation();delConv('${c.id}')">×</span>
    </div>`).join('');
}
async function newChat() {
  try { const c = await req('/conversations', {method:'POST',body:{title:'New Chat'}}); await loadConvs(); openConv(c); }
  catch(e) { toast('错误: '+e.message); }
}
function selectConv(id) { openConv(conversations.find(c=>c.id===id)); }
function openConv(c) {
  activeConv = c; messages = []; streamingText = ''; proposals = [];
  document.getElementById('convTitle').textContent = c ? c.title : 'Zenith v2';
  renderConvs(); renderMessages();
  if (c) { req('/conversations/'+c.id).then(r => { messages = r.messages || []; renderMessages(); }).catch(()=>{}); }
}
async function delConv(id) {
  if (!confirm('删除此对话？')) return;
  try { await req('/conversations/'+id, {method:'DELETE'}); await loadConvs();
    if (activeConv&&activeConv.id===id) { activeConv=null; messages=[]; renderMessages(); renderConvs(); } }
  catch(e) { toast('错误: '+e.message); }
}

// ─── Messages ───
function renderMessages() {
  const el = document.getElementById('msgArea');
  if (!messages.length && !streamingText) {
    el.innerHTML = '<div class="empty"><h3>Zenith v2</h3><p>你的本地智能助手<br>聊天、日程、笔记、代码执行</p></div>'; return;
  }
  let h = messages.filter(m=>m.role!=='system').map(m => `
    <div class="msg ${m.role==='user'?'usr':'ai'}">
      <div class="av">${m.role==='user'?'I':'Z'}</div>
      <div class="b">${esc(m.content)}</div>
    </div>`).join('');
  if (streamingText) h += `<div class="msg ai"><div class="av">Z</div><div class="b">${esc(streamingText)}</div></div>`;
  if (isLoading && !streamingText) h += '<div class="msg ai"><div class="av">Z</div><div class="b"><div class="typing"><span></span><span></span><span></span></div></div></div>';
  el.innerHTML = h;
  el.scrollTop = el.scrollHeight;
}
function addMsg(role, content) {
  messages.push({id: ++msgId, conversation_id: activeConv?activeConv.id:'', role, content, created_at: new Date().toISOString()});
  renderMessages();
}

// ─── Chat ───
async function sendMessage() {
  const inp = document.getElementById('chatInput');
  const text = inp.value.trim();
  if (!text || isLoading) return;
  inp.value = ''; inp.style.height = 'auto';

  if (!activeConv) {
    try { const c = await req('/conversations', {method:'POST',body:{title:text.slice(0,30)}}); activeConv=c; await loadConvs(); renderConvs(); document.getElementById('convTitle').textContent=c.title; }
    catch(e) { toast('错误: '+e.message); return; }
  }

  addMsg('user', text);
  isLoading = true; streamingText = '';
  document.getElementById('sendBtn').disabled = true;

  try {
    const r = await fetch(API + '/chat', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({message:text, conversation_id:activeConv.id})
    });
    const reader = r.body.getReader();
    const dec = new TextDecoder(); let buf = '', full = '';
    while (true) {
      const {done, value} = await reader.read(); if (done) break;
      buf += dec.decode(value, {stream:true});
      const lines = buf.split('\n'); buf = lines.pop()||'';
      for (const l of lines) {
        if (!l.startsWith('data: ')) continue;
        try {
          const d = JSON.parse(l.slice(6));
          if (d.type==='text') { streamingText += d.content; full += d.content; renderMessages(); }
          else if (d.type==='reminder') { showReminder(d.content); }
          else if (d.type==='proposal') { proposals.push(d.data); renderProposals(); }
          else if (d.type==='proposals') { proposals = d.proposals; renderProposals(); }
        } catch{}
      }
    }
    if (full.trim()) { addMsg('assistant', full); streamingText = ''; }
  } catch(e) { toast('错误: '+e.message); streamingText = ''; }
  isLoading = false; streamingText = '';
  document.getElementById('sendBtn').disabled = false;
  await loadConvs(); loadProps();
}

function handleKey(e) {
  if (e.key==='Enter'&&!e.shiftKey) { e.preventDefault(); sendMessage(); }
}

// ─── Reminders ───
function showReminder(content) {
  const el = document.getElementById('msgArea');
  const d = document.createElement('div');
  d.className = 'reminder';
  d.innerHTML = content.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  el.appendChild(d);
  setTimeout(() => d.remove(), 15000);
}

// ─── Proposals ───
function renderProposals() {
  const el = document.getElementById('proposalsBar');
  if (!proposals.length) { el.classList.add('hidden'); return; }
  el.classList.remove('hidden');
  el.innerHTML = `<div class="hint">AI 提议 (${proposals.length}) — 请确认或忽略</div>` +
    proposals.map(p => `
      <div class="prop-item">
        <span>${p.type==='schedule'?'📅':'📝'}</span>
        <span class="txt"><strong>${esc(p.title)}</strong>${p.time?' <span style="color:var(--text-muted)">'+esc(p.time)+'</span>':''}${p.description?' <span style="color:var(--text-muted)">'+esc(p.description)+'</span>':''}</span>
        <button class="btn btn-pri btn-sm" onclick="confirmProp('${p.type}',${p.id})">确认</button>
        <button class="btn btn-sm" onclick="rejectProp('${p.type}',${p.id})">忽略</button>
      </div>`).join('');
}
async function confirmProp(type, id) {
  try { await req('/proposals/confirm', {method:'POST',body:{type,id}}); proposals=proposals.filter(p=>!(p.type===type&&p.id===id)); renderProposals(); }
  catch(e) { toast('错误: '+e.message); }
}
async function rejectProp(type, id) {
  try { await req('/proposals/reject', {method:'POST',body:{type,id}}); proposals=proposals.filter(p=>!(p.type===type&&p.id===id)); renderProposals(); }
  catch(e) { toast('错误: '+e.message); }
}
async function loadProps() {
  try { proposals = await req('/proposals'); renderProposals(); } catch{}
}

// ─── Settings ───
let currentSettings = {};
async function showSettings() {
  try { currentSettings = await req('/settings'); }
  catch(e) { currentSettings = {}; }
  document.getElementById('chatView').classList.add('hidden');
  document.getElementById('settingsView').classList.remove('hidden');
  document.getElementById('s-api').value = currentSettings.api_base||'';
  document.getElementById('s-key').value = currentSettings.api_key||'';
  document.getElementById('s-model').value = currentSettings.model||'';
  document.getElementById('s-temp').value = currentSettings.temperature||0.7;
  document.getElementById('s-mt').value = currentSettings.max_tokens||4096;
  document.getElementById('s-temp-v').textContent = currentSettings.temperature||0.7;
  document.getElementById('s-temp').oninput = function(){document.getElementById('s-temp-v').textContent=this.value};
}
function hideSettings() {
  document.getElementById('chatView').classList.remove('hidden');
  document.getElementById('settingsView').classList.add('hidden');
}
async function saveSettings() {
  const data = {
    api_base: document.getElementById('s-api').value,
    api_key: document.getElementById('s-key').value,
    model: document.getElementById('s-model').value,
    temperature: parseFloat(document.getElementById('s-temp').value),
    max_tokens: parseInt(document.getElementById('s-mt').value)||4096,
  };
  try { await req('/settings', {method:'PUT',body:data}); toast('设置已保存'); hideSettings(); }
  catch(e) { toast('保存失败: '+e.message); }
}

// ─── Toast ───
function toast(msg) {
  const ct = document.getElementById('toastCt');
  const d = document.createElement('div'); d.className='toast'; d.textContent=msg;
  ct.appendChild(d); setTimeout(() => d.remove(), 4000);
}

// ─── Helpers ───
function esc(s) { if (!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ─── Init ───
loadConvs().then(() => { if (conversations.length) openConv(conversations[0]); });
loadProps();
</script>
</body>
</html>
